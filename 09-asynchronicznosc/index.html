<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>09 — Asynchroniczność</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 800px; }
    button { padding: 0.5rem 1rem; margin: 0.25rem; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    .loader { display: none; }
    .loader.active { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #result { background: #f5f5f5; padding: 1rem; border-radius: 4px; min-height: 2rem;
              font-family: monospace; white-space: pre-wrap; margin: 0.5rem 0; }
    .error { color: #f44336; }
    .success { color: #4caf50; }
    form { display: flex; flex-direction: column; gap: 0.5rem; max-width: 400px; }
    input, textarea { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
    #timer-display { font-size: 2rem; font-family: monospace; }
    .post-card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 0.5rem 0; }
    .post-card h3 { margin: 0 0 0.5rem; }
  </style>
</head>
<body>
  <h1>Asynchroniczność JS</h1>

  <!-- setTimeout / setInterval -->
  <section>
    <h2>setTimeout / setInterval</h2>
    <div id="timer-display">0</div>
    <button id="btn-start-timer">Start</button>
    <button id="btn-stop-timer">Stop</button>
    <button id="btn-reset-timer">Reset</button>
    <div id="timer-log"></div>
  </section>

  <!-- Promise / fetch -->
  <section>
    <h2>Fetch — pobieranie danych</h2>
    <button id="btn-fetch-users">Pobierz użytkowników</button>
    <button id="btn-fetch-posts">Pobierz posty</button>
    <button id="btn-fetch-error">Symuluj błąd 404</button>
    <span class="loader" id="loader">⟳</span>
    <div id="result"></div>
  </section>

  <!-- Formularz wysyłany przez fetch -->
  <section>
    <h2>Wysyłanie danych (POST)</h2>
    <form id="post-form">
      <input type="text" id="post-title" placeholder="Tytuł posta" required>
      <textarea id="post-body" placeholder="Treść posta" rows="3"></textarea>
      <button type="submit">Wyślij POST</button>
    </form>
    <div id="post-result"></div>
  </section>

  <!-- Promise.all -->
  <section>
    <h2>Promise.all — równoległe zapytania</h2>
    <button id="btn-parallel">Pobierz równolegle (users + posts + todos)</button>
    <div id="parallel-result"></div>
  </section>

  <script src="cwiczenia.js"></script>
</body>
</html>
